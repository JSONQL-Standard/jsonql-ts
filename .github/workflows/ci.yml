name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npx prettier --check "src/**/*.ts" "tests/**/*.ts"

      - name: TypeScript check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            package.json
            README.md
            LICENSE

  integration:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: jsonql
          POSTGRES_PASSWORD: password
          POSTGRES_DB: jsonql_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jsonql"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        adapter:
          - name: ts-express-simple
            port: 8080
            test-path: tests/unified
          - name: ts-express-lifecycle
            port: 8081
            test-path: tests/unified/lifecycle
          - name: ts-fastify-simple
            port: 8082
            test-path: tests/unified
          - name: ts-fastify-lifecycle
            port: 8083
            test-path: tests/unified/lifecycle
          - name: ts-nest-simple
            port: 8084
            test-path: tests/unified
          - name: ts-nest-lifecycle
            port: 8085
            test-path: tests/unified/lifecycle

    steps:
      - uses: actions/checkout@v4
        with:
          path: jsonql-ts

      - uses: actions/checkout@v4
        with:
          repository: JSONQL-Standard/jsonql-tests
          token: ${{ secrets.JSONQL_TESTS_TOKEN }}
          path: jsonql-tests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonql-ts from source
        run: |
          cd jsonql-ts
          npm ci
          npm run build

      - name: Install server dependencies
        run: |
          cd jsonql-tests/integration-tests/${{ matrix.adapter.name }}
          npm install

      - name: Install test runner dependencies
        run: pip install -r jsonql-tests/requirements.txt

      - name: Start ${{ matrix.adapter.name }}
        run: |
          cd jsonql-tests/integration-tests/${{ matrix.adapter.name }}
          DB_TYPE=postgres \
          DB_DSN="postgresql://jsonql:password@localhost:5432/jsonql_test" \
          PORT=${{ matrix.adapter.port }} \
          npm start &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:${{ matrix.adapter.port }}/health 2>/dev/null | grep -q status; then
              echo "Server ready (health endpoint)"
              break
            fi
            if curl -s http://localhost:${{ matrix.adapter.port }}/users -H "Content-Type: application/json" -d '{"fields":["id"]}' 2>/dev/null | grep -q data; then
              echo "Server ready (query endpoint)"
              break
            fi
            sleep 2
          done

      - name: Run compliance tests against ${{ matrix.adapter.name }}
        run: |
          cd jsonql-tests
          python -m pytest tests/ \
            --target=http://localhost:${{ matrix.adapter.port }} \
            --db-type=postgres \
            --db-dsn="postgresql://jsonql:password@localhost:5432/jsonql_test" \
            --test-path=${{ matrix.adapter.test-path }} \
            -q --tb=short

